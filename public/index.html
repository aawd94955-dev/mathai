<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수학 전문 교차 검증 AI</title>
  
  <!-- KaTeX CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  
  <style>
    :root {
      --primary-color: #0070f3;
      --bg-color: #f9fafb;
      --card-bg: #ffffff;
      --text-main: #1f2937;
      --text-muted: #6b7280;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      width: 100%;
      max-width: 800px;
      padding: 20px;
    }
    header {
      text-align: center;
      margin-bottom: 30px;
    }
    header h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    header p {
      color: var(--text-muted);
      margin: 0;
    }
    .input-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
      background-color: var(--card-bg);
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      margin-bottom: 24px;
    }
    textarea {
      width: 100%;
      height: 100px;
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      resize: vertical;
      font-size: 1rem;
      box-sizing: border-box;
      font-family: inherit;
    }
    textarea:focus {
      outline: none;
      border-color: var(--primary-color);
    }
    button {
      align-self: flex-end;
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #005bb5;
    }
    button:disabled {
      background-color: #9ca3af;
      cursor: not-allowed;
    }
    .result-box {
      background-color: var(--card-bg);
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      min-height: 200px;
      display: none;
    }
    .loading-status {
      text-align: center;
      color: var(--primary-color);
      font-weight: 600;
      margin: 40px 0;
      font-size: 1.1rem;
    }
    .content {
      line-height: 1.6;
      white-space: pre-wrap;
    }
    /* 스피너 애니메이션 */
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(0, 112, 243, 0.3);
      border-radius: 50%;
      border-top-color: var(--primary-color);
      animation: spin 1s ease-in-out infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>수학 전문 교차 검증 AI 🧮</h1>
      <p>Gemini와 WolframAlpha가 함께 문제를 풀고 검증합니다.</p>
    </header>

    <div class="input-box">
      <textarea id="questionInput" placeholder="풀고 싶은 수학 문제나 수식을 입력하세요..."></textarea>
      <button id="solveBtn">문제 풀기</button>
    </div>

    <div class="result-box" id="resultContainer">
      <div id="loadingStatus" class="loading-status" style="display: none;">
        <span class="spinner"></span> <span id="statusText">풀이 중...</span>
      </div>
      <div id="resultContent" class="content"></div>
    </div>
  </div>

  <!-- KaTeX Scripts -->
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

  <script>
    const solveBtn = document.getElementById('solveBtn');
    const questionInput = document.getElementById('questionInput');
    const resultContainer = document.getElementById('resultContainer');
    const loadingStatus = document.getElementById('loadingStatus');
    const statusText = document.getElementById('statusText');
    const resultContent = document.getElementById('resultContent');

    // 단계별 로딩 텍스트 시뮬레이션
    let statusInterval;
    const statuses = ["풀이 중...", "WolframAlpha와 교차 검증 중...", "최종안 작성 중..."];

    async function solveMathProblem() {
      const question = questionInput.value.trim();
      if (!question) return alert('문제를 입력해주세요.');

      // UI 초기화
      solveBtn.disabled = true;
      resultContainer.style.display = 'block';
      resultContent.innerHTML = '';
      loadingStatus.style.display = 'block';
      
      let statusIndex = 0;
      statusText.innerText = statuses[statusIndex];
      statusInterval = setInterval(() => {
        statusIndex = Math.min(statusIndex + 1, statuses.length - 1);
        statusText.innerText = statuses[statusIndex];
      }, 2000); // 2초마다 상태 변경 메시지 렌더링 (시각적 효과)

      try {
        const response = await fetch('/api/solve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });

        const data = await response.json();
        clearInterval(statusInterval);
        loadingStatus.style.display = 'none';

        if (data.error) {
          resultContent.innerHTML = `<span style="color:red;">오류: ${data.error}</span>`;
        } else {
          // 마크다운 형식의 줄바꿈과 텍스트를 할당
          resultContent.innerText = data.result;
          
          // KaTeX Auto-render 실행 (DOM 요소 내의 $..$, $$..$$ 수식을 찾아 렌더링)
          renderMathInElement(resultContent, {
            delimiters: [
              {left: '$$', right: '$$', display: true},
              {left: '$', right: '$', display: false},
              {left: '\\(', right: '\\)', display: false},
              {left: '\\[', right: '\\]', display: true}
            ],
            throwOnError: false
          });
        }
      } catch (error) {
        clearInterval(statusInterval);
        loadingStatus.style.display = 'none';
        resultContent.innerHTML = `<span style="color:red;">네트워크 또는 서버 오류가 발생했습니다.</span>`;
        console.error(error);
      } finally {
        solveBtn.disabled = false;
      }
    }

    solveBtn.addEventListener('click', solveMathProblem);
    
    // Enter 키로도 전송 가능하도록 설정 (Shift+Enter는 줄바꿈)
    questionInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        solveMathProblem();
      }
    });
  </script>
</body>
</html>
