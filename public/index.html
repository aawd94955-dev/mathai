<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수학 전문 교차 검증 AI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <style>
    :root { --primary-color: #0070f3; --bg-color: #f9fafb; }
    body { font-family: sans-serif; background: var(--bg-color); display: flex; justify-content: center; padding: 20px; }
    .container { width: 100%; max-width: 700px; }
    .card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    textarea { width: 100%; height: 100px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    button { background: var(--primary-color); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; float: right; margin-top: 10px; }
    button:disabled { background: #ccc; }
    .loading { color: var(--primary-color); font-weight: bold; text-align: center; display: none; padding: 20px; }
    .result-box { display: none; }

    /* 탭 */
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab-btn {
      flex: 1; padding: 10px; border: 2px solid #ddd; background: white;
      border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; color: #666;
    }
    .tab-btn.active { border-color: var(--primary-color); color: var(--primary-color); background: #eff6ff; }
    .tab-content { display: none; line-height: 1.8; white-space: pre-wrap; }
    .tab-content.active { display: block; }

    /* wolfram 배지 */
    .wolfram-badge {
      display: inline-block; background: #ff6b00; color: white;
      font-size: 12px; padding: 2px 8px; border-radius: 4px; margin-bottom: 12px;
    }
    .gemini-badge {
      display: inline-block; background: #4285f4; color: white;
      font-size: 12px; padding: 2px 8px; border-radius: 4px; margin-bottom: 12px;
    }
    .final-badge {
      display: inline-block; background: #16a34a; color: white;
      font-size: 12px; padding: 2px 8px; border-radius: 4px; margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>🧮 수학 교차 검증 서비스</h2>
      <textarea id="input" placeholder="문제를 입력하세요 (예: x^2 - 4 = 0의 해)"></textarea>
      <button id="btn">풀이 시작</button>
      <div style="clear:both;"></div>
    </div>

    <div class="card result-box" id="resultContainer">
      <div id="loading" class="loading">🔍 검증 중... 잠시만 기다려 주세요.</div>

      <div id="tabArea" style="display:none;">
        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('final')">✅ 최종 검증 풀이</button>
          <button class="tab-btn" onclick="switchTab('gemini')">🤖 Gemini 초안</button>
          <button class="tab-btn" onclick="switchTab('wolfram')">🔢 WolframAlpha</button>
        </div>

        <div class="tab-content active" id="tab-final">
          <span class="final-badge">최종 교차 검증 결과</span>
          <div id="output-final"></div>
        </div>
        <div class="tab-content" id="tab-gemini">
          <span class="gemini-badge">Gemini 초기 풀이</span>
          <div id="output-gemini"></div>
        </div>
        <div class="tab-content" id="tab-wolfram">
          <span class="wolfram-badge">WolframAlpha 계산 결과</span>
          <div id="output-wolfram"></div>
        </div>
      </div>
    </div>
  </div>

  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
  <script>
    function switchTab(name) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      event.target.classList.add('active');
    }

    function renderMath(el) {
      renderMathInElement(el, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$', right: '$', display: false }
        ],
        throwOnError: false
      });
    }

    const btn = document.getElementById('btn');
    const input = document.getElementById('input');
    const resBox = document.getElementById('resultContainer');
    const loading = document.getElementById('loading');
    const tabArea = document.getElementById('tabArea');

    btn.onclick = async () => {
      const val = input.value.trim();
      if (!val) return;
      btn.disabled = true;
      resBox.style.display = 'block';
      tabArea.style.display = 'none';
      loading.style.display = 'block';

      try {
        const res = await fetch('/api/solve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: val })
        });
        const data = await res.json();
        loading.style.display = 'none';

        if (data.error) {
          tabArea.style.display = 'none';
          loading.style.display = 'block';
          loading.innerText = '오류: ' + data.error;
        } else {
          tabArea.style.display = 'block';

          document.getElementById('output-final').innerText = data.result || '';
          document.getElementById('output-gemini').innerText = data.geminiDraft || '';
          document.getElementById('output-wolfram').innerText = data.wolfram || '';

          ['output-final', 'output-gemini'].forEach(id => {
            renderMath(document.getElementById(id));
          });
        }
      } catch (e) {
        loading.style.display = 'block';
        loading.innerText = '연결 오류가 발생했습니다.';
      } finally {
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
