<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수학 교차 검증 AI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mathquill@0.10.1/build/mathquill.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #3182F6;
      --primary-hover: #1B64DA;
      --bg: #F2F4F6;
      --surface: #FFFFFF;
      --border: #E5E8EB;
      --text-primary: #191F28;
      --text-secondary: #6B7684;
      --text-tertiary: #B0B8C1;
      --green: #0BB37A;
      --green-bg: #F0FDF9;
      --green-border: #C3F0E0;
      --orange: #F5792A;
      --orange-bg: #FFF7F0;
      --radius: 16px;
      --radius-sm: 10px;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 80px;
    }

    .header {
      width: 100%;
      max-width: 640px;
      margin-bottom: 24px;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .logo-icon svg { width: 20px; height: 20px; }
    .header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .header p {
      font-size: 14px;
      color: var(--text-secondary);
      letter-spacing: -0.2px;
      padding-left: 46px;
    }

    .card {
      width: 100%;
      max-width: 640px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 10px;
    }

    .input-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    .input-wrapper {
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      min-height: 80px;
      padding: 4px;
      transition: border-color 0.15s;
      cursor: text;
    }
    .input-wrapper:focus-within { border-color: var(--primary); }

    #mq-input {
      display: block;
      width: 100%;
      min-height: 72px;
      padding: 10px 12px;
      font-size: 16px;
    }
    .mq-editable-field {
      border: none !important;
      outline: none !important;
      font-family: 'Pretendard', sans-serif !important;
    }
    .mq-editable-field.mq-focused { box-shadow: none !important; }

    #input-fallback {
      display: block;
      width: 100%;
      min-height: 72px;
      padding: 10px 12px;
      font-size: 15px;
      font-family: 'Pretendard', sans-serif;
      border: none;
      outline: none;
      background: transparent;
      resize: none;
      color: var(--text-primary);
      line-height: 1.6;
    }
    #input-fallback::placeholder { color: var(--text-tertiary); }

    .input-hint {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 8px;
    }

    .btn-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 16px;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--primary);
      color: white;
      border: none;
      padding: 11px 20px;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      font-family: 'Pretendard', sans-serif;
      cursor: pointer;
      letter-spacing: -0.2px;
      transition: background 0.15s;
    }
    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
    .btn-primary:disabled { background: var(--border); color: var(--text-tertiary); cursor: not-allowed; }
    .btn-primary svg { width: 15px; height: 15px; }

    .loading-card {
      display: none;
      width: 100%;
      max-width: 640px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 36px 24px;
      text-align: center;
      margin-bottom: 10px;
    }
    .loading-spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .result-area {
      display: none;
      width: 100%;
      max-width: 640px;
    }

    .answer-box {
      background: var(--green-bg);
      border: 1.5px solid var(--green-border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 10px;
    }
    .answer-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 0.6px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .answer-label svg { width: 13px; height: 13px; }
    .answer-content {
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      line-height: 1.8;
    }

    .tab-bar {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 10px;
    }
    .tab-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 9px 4px;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Pretendard', sans-serif;
      color: var(--text-tertiary);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: -0.2px;
    }
    .tab-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
    .tab-btn.active { background: var(--bg); color: var(--text-primary); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .solution-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
    }
    .section-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .section-label svg { width: 13px; height: 13px; }
    .label-green  { color: var(--green); }
    .label-blue   { color: var(--primary); }
    .label-orange { color: var(--orange); }
    .label-gray   { color: var(--text-secondary); }

    .solution-body {
      font-size: 15px;
      line-height: 2;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .wolfram-body {
      font-size: 13px;
      line-height: 1.8;
      white-space: pre-wrap;
      font-family: 'SF Mono', 'Fira Mono', monospace;
      background: var(--orange-bg);
      border-radius: var(--radius-sm);
      padding: 16px;
    }
    .detail-body {
      font-size: 12px;
      line-height: 1.7;
      color: var(--text-secondary);
      white-space: pre-wrap;
      font-family: 'SF Mono', 'Fira Mono', monospace;
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 16px;
      max-height: 400px;
      overflow-y: auto;
    }

    .katex { font-size: 1em; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-top">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="5" x2="5" y2="19"/>
          <circle cx="6.5" cy="6.5" r="2.5"/>
          <circle cx="17.5" cy="17.5" r="2.5"/>
        </svg>
      </div>
      <h1>수학 교차 검증 AI</h1>
    </div>
    <p>Gemini × WolframAlpha 이중 검증 풀이 서비스</p>
  </div>

  <div class="card">
    <div class="input-label">문제 입력</div>
    <div class="input-wrapper" id="inputWrapper">
      <textarea id="input-fallback" placeholder="수학 문제를 입력하세요 (예: x^2 - 4 = 0의 해)"></textarea>
    </div>
    <div class="input-hint">LaTeX 입력 지원 · 예: \int_0^1 x\,dx · \lim_{x\to0}\frac{\sin x}{x}</div>
    <div class="btn-row">
      <button class="btn-primary" id="btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        풀이 시작
      </button>
    </div>
  </div>

  <div class="loading-card" id="loadingCard">
    <div class="loading-spinner"></div>
    <div class="loading-text">Gemini와 WolframAlpha가 검증 중입니다...</div>
  </div>

  <div class="result-area" id="resultArea">

    <div class="answer-box">
      <div class="answer-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        최종 답
      </div>
      <div class="answer-content" id="output-answer"></div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="final">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        최종 풀이
      </button>
      <button class="tab-btn" data-tab="gemini">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Gemini
      </button>
      <button class="tab-btn" data-tab="wolfram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8m-4-4v4"/></svg>
        Wolfram
      </button>
      <button class="tab-btn" data-tab="detail">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        세부 정보
      </button>
    </div>

    <div class="tab-content active" id="tab-final">
      <div class="solution-card">
        <div class="section-label label-green">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          교차 검증 최종 풀이
        </div>
        <div class="solution-body" id="output-final"></div>
      </div>
    </div>

    <div class="tab-content" id="tab-gemini">
      <div class="solution-card">
        <div class="section-label label-blue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          Gemini 초기 풀이
        </div>
        <div class="solution-body" id="output-gemini"></div>
      </div>
    </div>

    <div class="tab-content" id="tab-wolfram">
      <div class="solution-card">
        <div class="section-label label-orange">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8m-4-4v4"/></svg>
          WolframAlpha 계산 결과
        </div>
        <div class="wolfram-body" id="output-wolfram"></div>
      </div>
    </div>

    <div class="tab-content" id="tab-detail">
      <div class="solution-card">
        <div class="section-label label-gray">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          최종 프롬프트 전문
        </div>
        <div class="detail-body" id="output-detail"></div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathquill@0.10.1/build/mathquill.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

  <script>
    let mathField = null;
    let useMathQuill = false;

    window.addEventListener('load', () => {
      try {
        const MQ = MathQuill.getInterface(2);
        const wrapper = document.getElementById('inputWrapper');
        document.getElementById('input-fallback').remove();

        const mqEl = document.createElement('span');
        mqEl.id = 'mq-input';
        wrapper.appendChild(mqEl);

        mathField = MQ.MathField(mqEl, {
          spaceBehavesLikeTab: false,
          handlers: { enter: () => document.getElementById('btn').click() }
        });
        useMathQuill = true;
      } catch(e) {
        console.log('MathQuill fallback');
      }
    });

    function getInputValue() {
      if (useMathQuill && mathField) return mathField.latex();
      return document.getElementById('input-fallback')?.value?.trim() || '';
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    function renderMath(el) {
      renderMathInElement(el, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$', right: '$', display: false }
        ],
        throwOnError: false,
        strict: false
      });
    }

    function extractFinalAnswer(text) {
      const lines = text.split('\n');
      for (let i = 0; i < lines.length; i++) {
        if (lines[i].includes('최종 결과') || lines[i].includes('최종결과')) {
          const next = lines.slice(i + 1).find(l => l.trim().length > 0);
          if (next) return next.trim();
        }
      }
      const eqLines = lines.filter(l => l.includes('='));
      return eqLines.length > 0 ? eqLines[eqLines.length - 1].trim() : '';
    }

    const btn = document.getElementById('btn');
    const loadingCard = document.getElementById('loadingCard');
    const resultArea = document.getElementById('resultArea');

    btn.addEventListener('click', async () => {
      const val = getInputValue();
      if (!val) return;

      btn.disabled = true;
      loadingCard.style.display = 'block';
      resultArea.style.display = 'none';

      try {
        const res = await fetch('/api/solve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: val })
        });
        const data = await res.json();
        loadingCard.style.display = 'none';

        if (data.error) {
          loadingCard.style.display = 'block';
          loadingCard.querySelector('.loading-text').innerText = '오류: ' + data.error;
        } else {
          resultArea.style.display = 'block';

          const answerText = extractFinalAnswer(data.result || '');
          document.getElementById('output-answer').innerText = answerText;
          renderMath(document.getElementById('output-answer'));

          document.getElementById('output-final').innerText = data.result || '';
          renderMath(document.getElementById('output-final'));

          document.getElementById('output-gemini').innerText = data.geminiDraft || '';
          renderMath(document.getElementById('output-gemini'));

          document.getElementById('output-wolfram').innerText = data.wolfram || '';
          document.getElementById('output-detail').innerText = data.finalPrompt || '';

          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          document.querySelector('[data-tab="final"]').classList.add('active');
          document.getElementById('tab-final').classList.add('active');
        }
      } catch (e) {
        loadingCard.style.display = 'block';
        loadingCard.querySelector('.loading-text').innerText = '연결 오류가 발생했습니다.';
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
