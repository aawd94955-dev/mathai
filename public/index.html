<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수학 전문 교차 검증 AI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <style>
    :root { --primary-color: #0070f3; --bg-color: #f9fafb; }
    body { font-family: sans-serif; background: var(--bg-color); display: flex; justify-content: center; padding: 20px; }
    .container { width: 100%; max-width: 700px; }
    .card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    textarea { width: 100%; height: 100px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    button { background: var(--primary-color); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; float: right; margin-top: 10px; }
    button:disabled { background: #ccc; }
    .result-box { display: none; line-height: 1.6; white-space: pre-wrap; }
    .loading { color: var(--primary-color); font-weight: bold; text-align: center; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>🧮 수학 교차 검증 서비스</h2>
      <textarea id="input" placeholder="문제를 입력하세요 (예: x^2 - 4 = 0의 해)"></textarea>
      <button id="btn">풀이 시작</button>
      <div style="clear:both;"></div>
    </div>
    <div class="card result-box" id="resultContainer">
      <div id="loading" class="loading">검증 중... 잠시만 기다려 주세요.</div>
      <div id="output"></div>
    </div>
  </div>

  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
  <script>
    const btn = document.getElementById('btn');
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const resBox = document.getElementById('resultContainer');
    const loading = document.getElementById('loading');

    btn.onclick = async () => {
      const val = input.value.trim();
      if(!val) return;

      btn.disabled = true;
      resBox.style.display = 'block';
      output.innerText = '';
      loading.style.display = 'block';

      try {
        const res = await fetch('/api/solve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: val })
        });
        const data = await res.json();
        loading.style.display = 'none';
        
        if(data.error) {
          output.innerText = data.error;
        } else {
          output.innerText = data.result;
          renderMathInElement(output, {
            delimiters: [
              {left: '$$', right: '$$', display: true},
              {left: '$', right: '$', display: false}
            ],
            throwOnError: false
          });
        }
      } catch (e) {
        loading.style.display = 'none';
        output.innerText = '연결 오류가 발생했습니다.';
      } finally {
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
