<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수학 전문 교차 검증 AI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <style>
    :root { --primary-color: #0070f3; --bg-color: #f9fafb; }
    body { font-family: sans-serif; background: var(--bg-color); display: flex; justify-content: center; padding: 20px; }
    .container { width: 100%; max-width: 700px; }
    .card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    textarea { width: 100%; height: 100px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
    button { background: var(--primary-color); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; float: right; margin-top: 10px; font-size: 15px; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .loading { color: var(--primary-color); font-weight: bold; text-align: center; display: none; padding: 20px; }
    .result-box { display: none; }

    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab-btn {
      flex: 1; padding: 10px; border: 2px solid #ddd; background: white;
      border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; color: #666;
    }
    .tab-btn.active { border-color: var(--primary-color); color: var(--primary-color); background: #eff6ff; }
    .tab-content { display: none; line-height: 2; word-break: break-word; }
    .tab-content.active { display: block; }

    .badge {
      display: inline-block; color: white;
      font-size: 12px; padding: 2px 8px; border-radius: 4px; margin-bottom: 12px;
    }
    .badge-final  { background: #16a34a; }
    .badge-gemini { background: #4285f4; }
    .badge-wolfram { background: #ff6b00; }

    /* 최종 결과 강조 박스 */
    .final-answer-box {
      background: #f0fdf4;
      border: 2px solid #16a34a;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 20px;
      text-align: center;
      font-size: 1.2em;
    }
    .final-answer-label {
      font-size: 13px;
      font-weight: bold;
      color: #16a34a;
      margin-bottom: 8px;
    }

    /* 풀이 본문 */
    .solution-body {
      white-space: pre-wrap;
      line-height: 2;
    }

    /* wolfram plaintext */
    .wolfram-body {
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 14px;
      background: #fff7ed;
      padding: 12px;
      border-radius: 8px;
    }

    /* 세부정보(최종 프롬프트) */
    .detail-box {
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 12px;
      background: #f1f5f9;
      padding: 12px;
      border-radius: 8px;
      color: #334155;
      max-height: 400px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>🧮 수학 교차 검증 서비스</h2>
      <textarea id="input" placeholder="문제를 입력하세요 (예: x^2 - 4 = 0의 해)"></textarea>
      <button id="btn">풀이 시작</button>
      <div style="clear:both;"></div>
    </div>

    <div class="card result-box" id="resultContainer">
      <div id="loading" class="loading">🔍 검증 중... 잠시만 기다려 주세요.</div>

      <div id="tabArea" style="display:none;">
        <div class="tabs">
          <button class="tab-btn active" data-tab="final">✅ 최종 검증 풀이</button>
          <button class="tab-btn" data-tab="gemini">🤖 Gemini 초안</button>
          <button class="tab-btn" data-tab="wolfram">🔢 WolframAlpha</button>
          <button class="tab-btn" data-tab="detail">🗂 세부 정보</button>
        </div>

        <!-- 최종 검증 풀이 -->
        <div class="tab-content active" id="tab-final">
          <span class="badge badge-final">최종 교차 검증 결과</span>
          <div class="final-answer-box">
            <div class="final-answer-label">📌 최종 답</div>
            <div id="output-answer"></div>
          </div>
          <div class="solution-body" id="output-final"></div>
        </div>

        <!-- Gemini 초안 -->
        <div class="tab-content" id="tab-gemini">
          <span class="badge badge-gemini">Gemini 초기 풀이</span>
          <div class="solution-body" id="output-gemini"></div>
        </div>

        <!-- WolframAlpha -->
        <div class="tab-content" id="tab-wolfram">
          <span class="badge badge-wolfram">WolframAlpha 계산 결과</span>
          <div class="wolfram-body" id="output-wolfram"></div>
        </div>

        <!-- 세부 정보 -->
        <div class="tab-content" id="tab-detail">
          <span class="badge" style="background:#64748b;">최종 프롬프트 전문</span>
          <div class="detail-box" id="output-detail"></div>
        </div>
      </div>
    </div>
  </div>

  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
  <script>
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    function renderMath(el) {
      renderMathInElement(el, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$', right: '$', display: false }
        ],
        throwOnError: false,
        strict: false
      });
    }

    // 최종 결과 줄만 추출 (마지막 = 포함 줄 또는 "최종 결과" 이후)
    function extractFinalAnswer(text) {
      const lines = text.split('\n');
      // "최종 결과" 키워드 이후 줄 찾기
      for (let i = 0; i < lines.length; i++) {
        if (lines[i].includes('최종 결과') || lines[i].includes('최종결과')) {
          const next = lines.slice(i + 1).find(l => l.trim().length > 0);
          if (next) return next.trim();
        }
      }
      // fallback: = 기호가 있는 마지막 줄
      const eqLines = lines.filter(l => l.includes('='));
      return eqLines.length > 0 ? eqLines[eqLines.length - 1].trim() : '';
    }

    const btn = document.getElementById('btn');
    const input = document.getElementById('input');
    const resBox = document.getElementById('resultContainer');
    const loading = document.getElementById('loading');
    const tabArea = document.getElementById('tabArea');

    btn.addEventListener('click', async () => {
      const val = input.value.trim();
      if (!val) return;

      btn.disabled = true;
      resBox.style.display = 'block';
      tabArea.style.display = 'none';
      loading.style.display = 'block';
      loading.innerText = '🔍 검증 중... 잠시만 기다려 주세요.';

      try {
        const res = await fetch('/api/solve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: val })
        });
        const data = await res.json();
        loading.style.display = 'none';

        if (data.error) {
          loading.style.display = 'block';
          loading.innerText = '오류: ' + data.error;
        } else {
          tabArea.style.display = 'block';

          // 최종 답 추출 후 강조 박스
          const answerText = extractFinalAnswer(data.result || '');
          document.getElementById('output-answer').innerText = answerText;
          renderMath(document.getElementById('output-answer'));

          // 풀이 전체
          document.getElementById('output-final').innerText = data.result || '';
          renderMath(document.getElementById('output-final'));

          // Gemini 초안
          document.getElementById('output-gemini').innerText = data.geminiDraft || '';
          renderMath(document.getElementById('output-gemini'));

          // WolframAlpha (수식 렌더링 안 함)
          document.getElementById('output-wolfram').innerText = data.wolfram || '';

          // 세부 정보 (최종 프롬프트)
          document.getElementById('output-detail').innerText = data.finalPrompt || '';
        }
      } catch (e) {
        loading.style.display = 'block';
        loading.innerText = '연결 오류가 발생했습니다.';
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
